  <div class="media-controls">
    <div class="volume-group">
      <button id="btn-mute" class="media-btn" aria-label="Unmute audio">
        <svg class="icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/>
          <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
        <svg class="icon-unmuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
      <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.3" class="volume-slider" aria-label="Volume">
    </div>
    <button id="btn-pause" class="media-btn" aria-label="Pause video">
      <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <rect x="6" y="4" width="4" height="16" rx="1"/>
        <rect x="14" y="4" width="4" height="16" rx="1"/>
      </svg>
      <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </button>
  </div>

  <script>
    const video = document.getElementById('bg-video');
    const btnMute = document.getElementById('btn-mute');
    const btnPause = document.getElementById('btn-pause');
    const volumeSlider = document.getElementById('volume-slider');

    video.volume = 0.3;
    let savedVolume = 0.3;

    function updateMuteUI() {
      const muted = video.muted || video.volume === 0;
      btnMute.classList.toggle('is-unmuted', !muted);
      btnMute.setAttribute('aria-label', muted ? 'Unmute audio' : 'Mute audio');
    }

    document.addEventListener('click', function firstClick(e) {
      if (e.target.closest('.media-controls')) return;
      video.muted = false;
      updateMuteUI();
      document.removeEventListener('click', firstClick);
    });

    btnMute.addEventListener('click', () => {
      if (video.muted || video.volume === 0) {
        video.muted = false;
        video.volume = savedVolume || 0.3;
        volumeSlider.value = video.volume;
      } else {
        savedVolume = video.volume;
        video.muted = true;
      }
      updateMuteUI();
    });

    volumeSlider.addEventListener('input', () => {
      const val = parseFloat(volumeSlider.value);
      video.volume = val;
      video.muted = val === 0;
      if (val > 0) savedVolume = val;
      updateMuteUI();
    });

    btnPause.addEventListener('click', () => {
      if (video.paused) {
        video.play();
        btnPause.classList.remove('is-paused');
        btnPause.setAttribute('aria-label', 'Pause video');
      } else {
        video.pause();
        btnPause.classList.add('is-paused');
        btnPause.setAttribute('aria-label', 'Play video');
      }
    });
  </script>
